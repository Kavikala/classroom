<body>
    <div class="calc">
        <h2 class="title">FD rate calculator</h2>
        <input type="text"id="value" class="title-field" placeholder="Enter a months">
        <button class="button" onclick="tail()">Calculate</button>
        <div id="result" class="result"></div>
    </div>
    <script>
        function tail(){
            let months=document.getElementById("value").value;
            let result=document.getElementById("result");
            let rate=0;
            if(months<=3){
                rate=5.5;
            }
            else if(months>=3 && months<=6)
            {
                rate=6.5;
            }
            else if(months>=6 && months<=12)
            {
                rate=7.5;
            }
            
            else{
                rate=10.5;
            }
            result.innerText= "Rate is: "+ rate + "%";
        }
            

        
        </script>

      
</body>
